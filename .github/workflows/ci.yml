name: CI - Build and Test

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          CI: true
      - name: Build site (CI mode — no tracking IDs, no basePath)
        run: npm run build
        env:
          USE_BASE_PATH: false
          NEXT_PUBLIC_SITE_URL: https://clarkemoyer.com
      - run: npm run test:images
        env:
          CI: true
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Verify build output and serve work
        run: |
          npm run preview &
          SERVE_PID=$!
          sleep 3
          echo "=== Checking serve is running ==="
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" http://localhost:3000/
          echo "=== Title in served HTML ==="
          curl -s http://localhost:3000/ | grep -o '<title>[^<]*</title>' || echo "NO TITLE FOUND"
          kill $SERVE_PID
          wait $SERVE_PID 2>/dev/null || true
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7
