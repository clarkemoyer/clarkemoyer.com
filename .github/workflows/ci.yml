name: CI - Build and Test

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          CI: true
      - name: Build site (CI mode — no tracking IDs, no basePath)
        run: npm run build
        env:
          USE_BASE_PATH: false
          NEXT_PUBLIC_SITE_URL: https://clarkemoyer.com
      - run: npm run test:images
        env:
          CI: true
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Verify serve works before E2E
        run: |
          trap 'kill $SERVE_PID 2>/dev/null; wait $SERVE_PID 2>/dev/null || true' EXIT
          npm run preview &
          SERVE_PID=$!
          # Wait until server responds (up to 30s)
          curl --retry 10 --retry-connrefused --retry-delay 1 -s -o /dev/null http://localhost:3000/
          TITLE=$(curl -s http://localhost:3000/ | grep -o '<title>[^<]*</title>')
          echo "Served title: $TITLE"
          if [ -z "$TITLE" ]; then
            echo "ERROR: No title found in served HTML — build may be broken"
            exit 1
          fi
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7
