name: CI - Build and Test

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          CI: true
      - name: Build site
        run: npm run build
        env:
          USE_BASE_PATH: false
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-C2Q1HC0GVQ
          NEXT_PUBLIC_GTM_ID: GTM-5JL6TDQW
          NEXT_PUBLIC_SITE_URL: https://clarkemoyer.com
      - run: npm run test:images
        env:
          CI: true
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7
