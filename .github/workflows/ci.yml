name: CI - Build and Test

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          CI: true
      - name: Build site (CI mode — no tracking IDs, no basePath)
        run: npm run build
        env:
          USE_BASE_PATH: false
          NEXT_PUBLIC_SITE_URL: https://clarkemoyer.com
      - run: npm run test:images
        env:
          CI: true
      - name: Verify build output titles (static HTML check)
        run: |
          PAGES="out/index.html out/who-i-am/index.html out/fun/index.html out/certification-guides/index.html"
          for PAGE in $PAGES; do
            TITLE=$(grep -o '<title>[^<]*</title>' "$PAGE" || true)
            echo "$PAGE: $TITLE"
            if ! echo "$TITLE" | grep -qi "clarke moyer"; then
              echo "ERROR: Missing expected title in $PAGE"
              exit 1
            fi
          done
          echo "✅ Build output titles verified"
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7
