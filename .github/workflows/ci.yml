name: CI - Build and Test

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          CI: true
      - name: Build site (CI mode — no tracking IDs, no basePath)
        run: npm run build
        env:
          USE_BASE_PATH: false
          NEXT_PUBLIC_SITE_URL: https://clarkemoyer.com
      - run: npm run test:images
        env:
          CI: true
      - name: Verify build output titles and descriptions (must match tests/test.config.ts pages)
        run: |
          PAGES=(
            "out/index.html"
            "out/who-i-am/index.html"
            "out/free-for-charity/index.html"
            "out/psu-arl-referral-program/index.html"
            "out/wgu-referral-program/index.html"
            "out/certification-guides/index.html"
            "out/fun/index.html"
            "out/quotes/index.html"
            "out/it-project-management-resume-of-clarke-moyer/index.html"
            "out/western-governors-university-bs-it/index.html"
            "out/learn-free-charity/index.html"
            "out/personal-project-manager/index.html"
            "out/clarke-moyer-world-famous-apple-crisp-recipe/index.html"
            "out/clarke-moyer-sweet-tea-recipe/index.html"
            "out/clarke-moyer-philly-cheesesteak-recipe/index.html"
            "out/cooking/index.html"
            "out/affiliate-disclosure/index.html"
            "out/privacy-policy/index.html"
            "out/cookie-policy/index.html"
          )
          ERRORS=0
          for PAGE in "${PAGES[@]}"; do
            if [ ! -f "$PAGE" ]; then
              echo "ERROR: File not found: $PAGE"
              ERRORS=$((ERRORS+1))
              continue
            fi
            TITLE=$(grep -o '<title>[^<]*</title>' "$PAGE" || true)
            # Check for meta description tag (any attribute order)
            DESC=$(grep -c 'name="description"' "$PAGE" 2>/dev/null || echo 0)
            if echo "$TITLE" | grep -qi "clarke moyer"; then
              echo "OK title: $PAGE"
            else
              echo "ERROR: Title in $PAGE does not contain 'clarke moyer': $TITLE"
              ERRORS=$((ERRORS+1))
            fi
            if [ "$DESC" -gt 0 ]; then
              echo "OK desc:  $PAGE"
            else
              echo "ERROR: Missing description in $PAGE"
              ERRORS=$((ERRORS+1))
            fi
          done
          echo "Checked ${#PAGES[@]} pages, errors: $ERRORS"
          if [ "$ERRORS" -gt "0" ]; then exit 1; fi
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7
